name: basisbeveiliging exec


on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scope-scan
  cancel-in-progress: false

jobs:
  update-scope:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r engine/requirements.txt

      - name: Run update script
        run: |
          python engine/basisbeveiliging.py /tmp/basisbeveiliging_scope.txt
          cat /tmp/basisbeveiliging_scope.txt scope/rijksoverheid.txt \
            | sed '/^[[:space:]]*$/d' | sort -u > scope/rijksoverheid.tmp
          mv scope/rijksoverheid.tmp scope/rijksoverheid.txt


      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash
          git add -A scope/rijksoverheid.txt
          git commit -m "Auto-update: updated basisbeveiliging" || echo "No changes to commit"
          git push
